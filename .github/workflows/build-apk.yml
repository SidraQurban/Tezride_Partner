name: Build Partner APK

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Expo Prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: ${{ github.workspace }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        if: github.event.inputs.build_type != 'debug'
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android


      - name: Locate and rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          CAPS_TYPE="$(echo "$BUILD_TYPE" | sed 's/./\u&/')"
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          DEST="TezRidePartner-${BUILD_TYPE}-${TIMESTAMP}.apk"
          cp "$APK_PATH" "$DEST"
          echo "APK_FILE=$DEST" >> $GITHUB_ENV
          echo "APK ready: $DEST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TezRidePartner-APK-${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Build summary
        run: |
          echo "## TezRide Partner APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK File | \`${{ env.APK_FILE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section of this run." >> $GITHUB_STEP_SUMMARY
