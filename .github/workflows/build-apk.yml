name: Build Partner APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Partner APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env

      - name: Cache Expo prebuild
        id: cache-prebuild
        uses: actions/cache@v4
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package-lock.json', 'app.config.js', 'app.config.ts') }}
          restore-keys: expo-prebuild-${{ runner.os }}-

      - name: Expo Prebuild
        if: steps.cache-prebuild.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle build output
        uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            android/app/build
          key: gradle-build-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}-${{ github.sha }}
          restore-keys: |
            gradle-build-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}-
            gradle-build-${{ runner.os }}-

      - name: Build Release APK
        if: ${{ (github.event.inputs.build_type || 'release') == 'release' }}
        run: ./gradlew assembleRelease --build-cache --parallel --daemon -x lint -x lintVitalAnalyzeRelease -x lintVitalRelease -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
        working-directory: android

      - name: Build Debug APK
        if: ${{ (github.event.inputs.build_type || 'release') == 'debug' }}
        run: ./gradlew assembleDebug --build-cache --parallel --daemon -x lint -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
        working-directory: android

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          DEST="TezRidePartner-${BUILD_TYPE}-run${{ github.run_number }}.apk"
          cp "$APK" "$DEST"
          echo "APK_FILE=$DEST" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TezRidePartner-${{ github.event.inputs.build_type || 'release' }}-run${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          retention-days: 14

      - name: Build Summary
        run: |
          echo "## TezRide Partner APK" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_FILE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ github.event.inputs.build_type || 'release' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
